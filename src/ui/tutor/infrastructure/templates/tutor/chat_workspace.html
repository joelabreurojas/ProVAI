{% extends "layouts/app_layout.html" %} {% block app_content %}
<div class="h-full max-h-[calc(100vh-100px)]">
  <!-- This is the same container from the tutor_workspace, but we will load
         the messaging interface into it directly on page load. -->
  <div
    id="chats-panel-container"
    class="bg-nord-bg-2 border border-nord-border rounded-lg shadow-lg h-full"
    hx-get="/chats/{{ chat.id }}/messaging-interface"
    hx-trigger="load"
    hx-swap="innerHTML"
  >
    {# --- Skeleton Screen for Messaging Interface --- #}
    <div class="p-4 animate-pulse h-full">
      <div class="flex items-center pb-4 border-b border-nord-border">
        <div class="h-8 w-8 bg-nord-bg rounded-md mr-4"></div>
        <div class="h-7 bg-nord-bg rounded w-1/3"></div>
      </div>
      <div class="space-y-6 py-4 flex-grow">
        <div class="flex items-start gap-4">
          <div class="h-8 w-8 rounded-full bg-nord-bg"></div>
          <div class="h-12 w-3/5 rounded-lg bg-nord-bg"></div>
        </div>
        <div class="flex items-start gap-4 flex-row-reverse">
          <div class="h-8 w-8 rounded-full bg-nord-bg"></div>
          <div class="h-16 w-1/2 rounded-lg bg-nord-bg"></div>
        </div>
      </div>
      <div class="pt-4 border-t border-nord-border">
        <div class="h-10 bg-nord-bg rounded-lg w-full"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
