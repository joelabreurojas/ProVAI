<div 
    class="p-4 flex flex-col h-full" 
    x-init="chats = JSON.parse('{{ chats_json | e | safe }}')"
    hx-get="/tutors/{{ tutor.id }}/chats-panel"
    hx-trigger="refreshChatPanel from:body"
    hx-target="this"
    hx-swap="innerHTML"
>
  <!-- Header -->
  <div class="flex-shrink-0 flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold text-white">Conversations</h2>
    <form
      hx-post="/tutors/create-chat/{{ tutor.id }}"
      hx-target="#chats-panel-container"
      hx-swap="innerHTML"
      hx-indicator="#new-chat-spinner"
    >
      {% include "partials/_csrf_token_input.html" %}
      <button type="submit" class="btn btn-primary btn-sm flex items-center">
        <svg class="h-5 w-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.25a.75.75 0 01.75.75v8.25h8.25a.75.75 0 010 1.5h-8.25v8.25a.75.75 0 01-1.5 0v-8.25H2.25a.75.75 0 010-1.5h8.25V3a.75.75 0 01.75-.75z" /></svg>
        New Chat
        <div id="new-chat-spinner" class="htmx-indicator ml-2">
            <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </div>
      </button>
    </form>
  </div>

  <!-- Search Bar -->
  <div class="relative mb-4 flex-shrink-0">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      </div>
      <input
        type="search"
        placeholder="Search conversations..."
        class="w-full bg-nord-bg border border-nord-border rounded-md p-2 pl-10 text-sm"
        x-model.debounce.300ms="chatSearchQuery"
      />
  </div>

  <div class="flex-grow min-h-0">
      <!-- Empty States -->
      <template x-if="chats.length === 0">
          <div class="h-full flex flex-col items-center justify-center text-center text-gray-500 p-8" x-cloak>
              <svg class="h-12 w-12 mb-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              <h3 class="font-semibold text-white">Start Your First Conversation</h3>
              <p class="mt-1 text-sm">Click the "New Chat" button to begin your session.</p>
          </div>
      </template>
      <template x-if="chats.length > 0 && filteredChats.length === 0">
          <div class="h-full flex flex-col items-center justify-center text-center text-gray-500 p-8" x-cloak>
              <svg class="h-12 w-12 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
              <h3 class="font-semibold text-white">No Conversations Found</h3>
              <p class="mt-1 text-sm">Your search for "<span class="font-bold" x-text="chatSearchQuery"></span>" did not match any conversations.</p>
          </div>
      </template>

      <!-- List State -->
      <template x-if="filteredChats.length > 0">
          <div class="h-full overflow-y-auto overflow-x-visible custom-scrollbar -mr-4 pr-4" x-cloak>
            <ul 
                class="space-y-1 mb-10" 
                x-data="{ openMenuId: null }" 
                x-init="$nextTick(() => { htmx.process($el) })"
            >
                  <template x-for="(chat, index) in filteredChats" :key="chat.id">
                      <li
                        class="relative rounded-lg hover:bg-nord-border transition-colors"
                        x-data="{ editing: false }"
                        :class="{ 'z-10': openMenuId === chat.id }"
                      >
                           <!-- View State -->
                           <template x-if="!editing">
                                <div class="relative">
                                    <a
                                        class="block p-3"
                                        :href="`/chats/${chat.id}`"
                                        :hx-get="`/chats/${chat.id}/messaging-interface`"
                                        hx-target="#chats-panel-container"
                                        hx-swap="innerHTML"
                                        :hx-push-url="`/chats/${chat.id}`"
                                    >
                                        <h3 class="font-semibold text-white truncate pr-8" x-text="chat.title"></h3>
                                        <p class="text-sm text-gray-400 mt-1 truncate" x-text="`Started on ${new Date(chat.created_at).toLocaleDateString()}`"></p>
                                    </a>
                                    <div class="absolute top-1/2 right-3 -translate-y-1/2" @click.stop>
                                        <button @click="openMenuId = (openMenuId === chat.id) ? null : chat.id" class="cursor-pointer p-1 rounded-full text-gray-400 hover:text-white hover:bg-nord-bg focus:outline-none">
                                            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" /></svg>
                                        </button>
                                        <div 
                                          x-show="openMenuId === chat.id" 
                                          @click.away="openMenuId = null" 
                                          x-cloak 
                                          x-transition
                                          class="absolute w-48 rounded-md shadow-lg py-1 bg-nord-bg-2 ring-1 ring-nord-border z-20 top-0 origin-top-right right-full mr-2"
                                        >
                                            <a href="#" @click.prevent="editing = true; openMenuId = null" class="block px-4 py-2 text-sm text-gray-300 hover:bg-nord-border">Rename</a>
                                            
                                            <form
                                                :hx-post="`/chats/${chat.id}/delete`"
                                                hx-swap="none"
                                                hx-confirm="Are you sure you want to delete this chat?"
                                                hx-on::after-request="htmx.trigger('body', 'refreshChatPanel')"
                                            >
                                                {% include "partials/_csrf_token_input.html" %}
                                                <button type="submit" class="cursor-pointer w-full text-left block px-4 py-2 text-sm text-red-400 hover:bg-nord-border">Delete Chat</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                           </template>

                           <!-- Edit State -->
                            <template x-if="editing">
                                <div class="p-3 w-full" x-cloak>
                                    <form
                                        class="flex items-center space-x-2"
                                        :hx-post="`/chats/${chat.id}/edit`"
                                        hx-swap="none"
                                        hx-on::after-request="editing = false; htmx.trigger('body', 'refreshChatPanel')" 
                                        x-init="htmx.process($el)"
                                    >
                                        {% include "partials/_csrf_token_input.html" %}
                                        <input type="text" name="title" :value="chat.title" class="w-full bg-nord-bg border border-nord-accent rounded-md p-2 text-sm" autofocus />
                                        <button type="submit" class="btn btn-primary btn-sm">Save</button>
                                        <button type="button" @click="editing = false" class="btn btn-secondary btn-sm">Cancel</button>
                                    </form>
                                </div>
                            </template>
                      </li>
                  </template>
              </ul>
          </div>
      </template>
  </div>
</div>
