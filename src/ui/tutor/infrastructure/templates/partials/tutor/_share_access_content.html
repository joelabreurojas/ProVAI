{# The main shell for the "Share Access" modal. It acts as a container for the
three decoupled sections. #}
<div
  x-show="showShareModal"
  x-cloak
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
  @click="showShareModal = false"
  @keydown.escape.window="showShareModal = false"
  x-transition
>
  <div
    class="w-full max-w-lg bg-nord-bg-2 border border-nord-border p-6 rounded-lg shadow-2xl flex flex-col max-h-[90vh]"
    @click.stop
  >
    <!-- Modal Header -->
    <div class="flex-shrink-0 flex justify-between items-center border-b border-nord-border pb-3">
        <h3 class="text-lg font-bold text-white">Share Access to '{{ tutor.course_name }}'</h3>
        <button @click="showShareModal = false" class="btn btn-secondary btn-sm text-2xl">&times;</button>
    </div>

    <div class="flex-grow overflow-y-auto custom-scrollbar mt-4 space-y-6">
        <!-- Section 1: Invitation Link -->
        <section x-data="{ copied: false, tokenValue: '{{ tutor.token }}' }">
            <label class="block text-sm font-medium text-nord-text">Invitation Token</label>
            <div class="mt-1 flex rounded-md shadow-sm">
                <input 
                    type="text" 
                    readonly 
                    :value="tokenValue"
                    class="p-2 flex-1 block w-full rounded-none rounded-l-md bg-nord-bg border-nord-border text-gray-400 font-mono sm:text-sm"
                >
                <button 
                    @click="
                        navigator.clipboard.writeText(tokenValue);
                        copied = true;
                        setTimeout(() => copied = false, 2000);
                    "
                    type="button" 
                    class="cursor-pointer relative -ml-px inline-flex items-center space-x-2 rounded-r-md border border-nord-border bg-nord-bg-2 px-4 py-2 text-sm font-medium text-gray-300 hover:bg-nord-border"
                >
                    <svg class="h-5 w-5" x-show="!copied" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a2.25 2.25 0 0 1-2.25 2.25h-1.5a2.25 2.25 0 0 1-2.25-2.25v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" /></svg>
                    <svg class="h-5 w-5 text-green-400" x-show="copied" x-cloak xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
                    <span x-text="copied ? 'Copied!' : 'Copy'">Copy</span>
                </button>
            </div>
        </section>

        <!-- Section 2: Add New Students -->
        <section>
            <form 
              x-ref="addForm"
              hx-post="/tutors/{{ tutor.id }}/share"
              hx-target="#authorized-students-list"
              hx-swap="outerHTML"
              @htmx:after-request="if(event.detail.successful) $refs.addForm.reset()"
            >
              {% include "partials/_csrf_token_input.html" %}
              <label for="emails-textarea" class="block text-sm font-medium text-nord-text">Invite New Students</label>
              <textarea 
                id="emails-textarea"
                name="emails" 
                rows="3" 
                class="mt-1 w-full bg-nord-bg border border-nord-border rounded-md p-2" 
                placeholder="Enter student emails, one per line or separated by commas."
              ></textarea>
              <div class="mt-2 flex justify-end">
                <button type="submit" class="btn btn-primary btn-normal">Send Invitations</button>
              </div>
            </form>
        </section>

        <!-- Section 3: Manage Existing Students -->
        <section>
          <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Authorized Students</h3>
          <div id="authorized-students-list-container" class="mt-2 border border-nord-border rounded-lg">
              {% include "partials/tutor/_authorized_students_list.html" %}
          </div>
        </section>
    </div>
  </div>
</div>
