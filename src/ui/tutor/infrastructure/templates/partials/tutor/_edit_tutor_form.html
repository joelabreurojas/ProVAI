{#
  This partial contains the form for editing a Tutor/Assistant's details.
  It is swapped into the contextual sidebar by an HTMX GET request.
#}
<form
    class="space-y-4"
    hx-post="/tutors/{{ tutor.id }}/edit"
    hx-target="#toast-container"
    hx-swap="innerHTML"
    hx-indicator="#edit-tutor-spinner"
>
    {% include "partials/_csrf_token_input.html" %}
    <div>
        <label for="course_name_edit" class="block text-sm font-medium text-nord-text">Assistant Name</label>
        <input 
            id="course_name_edit" 
            name="course_name" 
            type="text" 
            value="{{ tutor.course_name }}" 
            required 
            class="mt-1 w-full bg-nord-bg border border-nord-border rounded-md p-2"
        >
    </div>
    <div>
        <label for="description_edit" class="block text-sm font-medium text-nord-text">Description (Optional)</label>
        <textarea 
            id="description_edit" 
            name="description" 
            rows="4" 
            class="mt-1 w-full bg-nord-bg border border-nord-border rounded-md p-2"
        >{{ tutor.description or '' }}</textarea>
    </div>
    <div class="flex justify-end items-center space-x-2 pt-2">
        <div id="edit-tutor-spinner" class="htmx-indicator text-sm text-gray-400 mr-2">
            <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </div>
        <button 
            type="button" 
            class="btn btn-secondary btn-sm"
            hx-get="/tutors/{{ tutor.id }}/contextual-sidebar"
            hx-target="#contextual-sidebar-container"
            hx-swap="innerHTML"
        >
            Cancel
        </button>
        <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
    </div>
</form>
