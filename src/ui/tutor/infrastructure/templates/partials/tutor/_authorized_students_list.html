<ul id="authorized-students-list" class="divide-y divide-nord-border">
  {% for email in authorized_emails %}
  <li class="flex justify-between items-center p-3">
    <span class="text-sm text-gray-300 truncate">{{ email }}</span>
    <form 
        hx-post="/tutors/{{ tutor.id }}/authorized-emails/{{ email }}/delete"
        hx-target="#authorized-students-list"
        hx-swap="outerHTML"
        hx-confirm="Are you sure you want to revoke access for {{ email }}?"
    >
        {% include "partials/_csrf_token_input.html" %}
        <button 
            type="submit"
            class="cursor-pointer p-1 rounded-md text-gray-400 hover:bg-red-900/50 hover:text-red-300 transition-colors"
            title="Remove Access"
        >
            <span class="sr-only">Remove Access</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.124-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.077-2.09.921-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>
        </button>
    </form>
  </li>
  {% else %}
  <li class="p-4 text-center text-sm text-gray-500">
    No students have been invited yet.
  </li>
  {% endfor %}
</ul>
