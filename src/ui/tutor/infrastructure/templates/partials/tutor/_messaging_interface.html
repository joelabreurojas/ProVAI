<div id="messaging-interface" class="p-4 flex flex-col h-full">
  <!-- Header -->
  <div
    id="messaging-header-container"
    class="flex-shrink-0 flex items-center justify-between pb-4 border-b border-nord-border"
    x-data="{ editing: false, open: false }"
    @click.away="open = false"
  >
    <!-- Left Side: Title / Edit Form -->
    <div
      id="messaging-header-content"
      class="flex items-center min-w-0 flex-grow"
    >
      <!-- View State -->
      <template x-if="!editing">
        <div class="flex items-center min-w-0">
          <a href="/tutors/{{ tutor.id }}" class="btn btn-secondary btn-sm mr-4 flex-shrink-0" title="Back to Conversations">
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>
          </a>
          <h2 class="text-xl font-bold text-white truncate">{{ chat.title }}</h2>
        </div>
      </template>

      <!-- Edit State -->
      <template x-if="editing">
        <form
          class="flex items-center space-x-2 w-full"
          method="post"
          hx-post="/chats/{{ chat.id }}/edit-inline"
          hx-target="#messaging-header-content"
          hx-swap="outerHTML"
          x-init="htmx.process($el)"
        >
          {% include "partials/_csrf_token_input.html" %}
          <input
            type="text"
            name="title"
            value="{{ chat.title }}"
            class="w-full bg-nord-bg border border-nord-accent rounded-md p-2 text-xl font-bold text-white"
            autofocus
            @keydown.escape.prevent="editing = false"
          />
          <button type="submit" class="btn btn-primary btn-sm flex-shrink-0">Save</button>
          <button type="button" @click="editing = false" class="btn btn-secondary btn-sm flex-shrink-0">Cancel</button>
        </form>
      </template>
    </div>

    <!-- Right Side: Dropdown Menu -->
    <div class="relative ml-4 flex-shrink-0">
      <button @click="open = !open" class="cursor-pointer p-1 rounded-full text-gray-400 hover:text-white hover:bg-nord-bg focus:outline-none">
        <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" /></svg>
      </button>
      <div
        x-show="open"
        x-cloak
        x-transition
        class="origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-lg py-1 bg-nord-bg-2 ring-1 ring-nord-border z-20"
      >
        <a href="#" @click.prevent="editing = true; open = false" class="block px-4 py-2 text-sm text-gray-300 hover:bg-nord-border">
          Rename
        </a>
        <form
          method="post"
          hx-post="/chats/{{ chat.id }}/delete-inline"
          hx-confirm="Are you sure you want to delete this chat? This action cannot be undone."
        >
          {% include "partials/_csrf_token_input.html" %}
          <button type="submit" class="cursor-pointer w-full text-left block px-4 py-2 text-sm text-red-400 hover:bg-nord-border">
            Delete Chat
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Message History (Scrollable Area) -->
  <div id="message-list" class="pb-20 flex-grow overflow-y-auto custom-scrollbar py-4 space-y-6">
    {% for message in messages %}
        {% include "partials/tutor/_message_bubble.html" %}
    {% else %}
    <div class="h-full flex items-center justify-center text-gray-500">
      <p class="pt-18">Send a message to start the conversation.</p>
    </div>
    {% endfor %}
  </div>

  <!-- Chat Input Form -->
  <div class="flex-shrink-0 pt-4 border-t border-nord-border">
    <form
      x-ref="chatForm"
      method="post"
      class="group"
      hx-post="/chats/{{ chat.id }}/send-message"
      hx-target="#message-list"
      hx-swap="beforeend"
      @htmx:after-request="if(event.detail.successful) $refs.chatForm.reset()"
    >
      {% include "partials/_csrf_token_input.html" %}
      <div class="flex items-center bg-nord-bg border border-nord-border rounded-lg focus-within:ring-2 focus-within:ring-nord-accent">
          <textarea
            name="query"
            rows="1"
            class="flex-grow bg-transparent p-3 text-sm resize-none focus:ring-0 focus:outline-none group-[.htmx-request]:opacity-50"
            placeholder="Ask a question about the course material..."
            autofocus
            x-on:keydown.enter.prevent.stop="
                if (($event.ctrlKey || $event.metaKey) && !$el.closest('.htmx-request')) {
                    $el.closest('form').requestSubmit();
                }
            "
          ></textarea>
          <button
            type="submit"
            class="btn btn-primary btn-sm p-2 m-2 flex-shrink-0 group-[.htmx-request]:opacity-50"
            title="Send Message (Ctrl+Enter)"
          >
              <svg class="h-5 w-5 group-[.htmx-request]:hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" /></svg>
              <svg class="animate-spin h-5 w-5 text-white hidden group-[.htmx-request]:block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          </button>
      </div>
    </form>
  </div>
</div>
