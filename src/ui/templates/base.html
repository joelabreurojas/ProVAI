<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("ProVAI") }}</title>
    
    <!-- Professional Asset Loading: Link to compiled and minified CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/output.css') }}">
    
    <!-- HTMX for Server Interactivity -->
    <script src="https://unpkg.com/htmx.org@2.0.6" integrity="sha384-H4T6dF1/1Z7wFq6yvS9I5j6/oX4J8j1pBqL5fF5x1P3dGfB6oG7j8s6H5r6B6P5d" crossorigin="anonymous"></script>
    
    <!-- Alpine.js for Client-Side Interactivity (defer ensures it runs after DOM is ready) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>

    {% block head_scripts %}{% endblock %}
</head>
<body class="bg-nord-bg text-nord-text font-sans antialiased">
    
    <!-- Main application container -->
    <div id="app-container" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </div>

    {% block footer_scripts %}{% endblock %}
</body>
</html>
