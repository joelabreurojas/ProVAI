{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="border-b border-nord-border pb-5 mb-8">
        <h1 class="text-3xl font-bold leading-tight tracking-tight text-white">Your Learning Hub 📚</h1>
        <p class="mt-2 max-w-4xl text-sm text-gray-400">
            Welcome back, {{ user.name }}! Select a Tutor to begin your study session, or create a new one if you're a teacher.
        </p>
    </div>

    <!-- This container will be dynamically filled by HTMX on page load -->
    <div id="tutor-list-container" 
         hx-get="/dashboard/tutors" 
         hx-trigger="load" 
         hx-swap="outerHTML">
        
        <!-- Loading State -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-nord-bg-2 border border-nord-border rounded-lg p-6 flex items-center justify-center col-span-full h-48">
                <div class="text-center text-gray-400">
                    <svg class="mx-auto h-8 w-8 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="mt-4">Loading your tutors...</p>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
