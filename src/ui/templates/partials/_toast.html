{# This component no longer needs the hx-swap-oob attribute #}
{# It's now a pure, clean template. #}

{% set colors = ... %} {# (The color logic is unchanged) #}
{% set color_scheme = colors.get(toast_type, colors.error) %}

<div id="{{ toast_id }}" 
     class="max-w-xs {{ color_scheme.bg }} border {{ color_scheme.border }} text-sm rounded-xl shadow-lg mb-3" 
     role="alert"
     x-data="{ show: true }"
     x-show="show"
     x-init="setTimeout(() => show = false, 5000)"
     x-transition:leave="transition ease-in duration-300"
     x-transition:leave-start="opacity-100 transform translate-x-0"
     x-transition:leave-end="opacity-0 transform translate-x-full">
    
    <div class="flex p-4">
        <!-- ... (the rest of the toast content is unchanged) ... -->
    </div>
</div>
