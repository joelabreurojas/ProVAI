<form class="space-y-6"
      x-data="{ isSubmitting: false }"
      method="POST"
      action="/auth/register"
      hx-post="/auth/register"
      @htmx:before-request="isSubmitting = true"
      @htmx:after-request="isSubmitting = false">

    {% if error_message %}
    <div class="bg-red-900 border border-red-700 text-red-200 px-4 py-3 rounded-md text-sm" role="alert">
        {{ error_message }}
    </div>
    {% endif %}

    <div>
        <label for="name" class="block text-sm font-medium text-nord-text">Full Name</label>
        <input id="name" name="name" type="text" required class="mt-1 w-full bg-nord-bg border border-nord-border rounded-md p-2">
    </div>
    <div>
        <label for="email-reg" class="block text-sm font-medium text-nord-text">Email address</label>
        <input id="email-reg" name="email" type="email" required class="mt-1 w-full bg-nord-bg border border-nord-border rounded-md p-2">
    </div>
    <div x-data="{ show: false }">
        <label for="password" class="block text-sm font-medium text-nord-text">Password</label>
        <div class="mt-1 relative">
            <input id="password" name="password" :type="show ? 'text' : 'password'" autocomplete="current-password" required 
                    class="w-full bg-nord-bg border border-nord-border rounded-md p-2 focus:ring-nord-accent focus:border-nord-accent">
            <div class="absolute cursor-pointer inset-y-0 right-0 pr-3 flex items-center">
                <button @click="show = !show" type="button" class="cursor-pointer text-gray-400 hover:text-white">
                    <!-- Eye Icon Logic -->
                    <svg x-show="!show" class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    <svg x-show="show" class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="display: none;"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.243 4.243L6.228 6.228" /></svg>
                </button>
            </div>
        </div>
    </div>
    <div>
        <div class="flex justify-center">
            <button type="submit" 
                    :disabled="isSubmitting"
                    :class="{ 'btn-loading': isSubmitting }"
                    class="btn btn-primary btn-normal">
                
                <span x-show="!isSubmitting">Join ProVAI</span>
            </button>
        </div>
    </div>
</form>
