<div id="tutor-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for tutor in tutors %}
    <div class="bg-nord-bg-2 border border-nord-border rounded-lg shadow-lg p-6 flex flex-col">
        <h3 class="text-xl font-semibold text-white">{{ tutor.course_name }}</h3>
        <p class="text-sm text-gray-400 mt-1">Taught by {{ tutor.teacher.name }}</p>
        <div class="mt-4 flex-grow">
            <p class="text-xs text-gray-500 mb-1">Roadmap Progress</p>
            <div class="w-full bg-nord-bg rounded-full h-2.5">
                <div class="bg-nord-accent h-2.5 rounded-full" style="width: 25%"></div>
            </div>
        </div>
        <a href="/chat/{{ tutor.id }}" class="btn btn-primary btn-normal mt-6">
            Start Tutoring Session
        </a>
    </div>
    {% endfor %}

    {% if user.role == 'teacher' %}
    <div class="border-2 border-dashed border-nord-border rounded-lg p-6 text-center hover:border-nord-accent transition-colors">
        <form hx-post="/dashboard/tutors" hx-target="#tutor-list-container" hx-swap="outerHTML">
            <h3 class="mt-2 text-sm font-medium text-white">Create New Tutor</h3>
            <div class="mt-4">
                <input type="text" name="course_name" required
                       class="w-full bg-nord-bg border border-nord-border rounded-md p-2 text-sm"
                       placeholder="e.g., Quantum Physics 101">
            </div>
            <div class="mt-6">
                <button type="submit" class="btn btn-primary btn-normal">
                    Create
                </button>
            </div>
        </form>
    </div>
    {% endif %}
</div>
