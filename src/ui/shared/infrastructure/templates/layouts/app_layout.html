{% extends "base.html" %}

{% block head_scripts %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('appLayout', () => ({
            sidebarOpen: Alpine.$persist(true).as('provai_sidebar_open'),
            searchQuery: '',
            tutors: {{ tutors_json | safe }},
            view: Alpine.$persist('{{ 'assistants' if user.role == "teacher" and (tutors | selectattr('teacher_id', 'equalto', user.id) | list | length > 0) else 'tutors' }}').as('provai_sidebar_view'),

            get enrolledTutors() {
                if (!this.tutors) return [];
                return this.tutors.filter(t => t.teacher_id !== {{ user.id }});
            },
            get ownedAssistants() {
                if (!this.tutors) return [];
                return this.tutors.filter(t => t.teacher_id === {{ user.id }});
            },
            async refreshTutors() {
                try {
                    const response = await fetch('/actions/tutors-data');
                    if (!response.ok) { throw new Error('Network response was not ok'); }
                    this.tutors = await response.json();
                } catch (error) {
                    console.error('Failed to refresh tutor list:', error);
                    const toastContainer = document.getElementById('toast-container');
                    if (toastContainer) {
                        htmx.ajax('GET', '/actions/error-toast', { target: toastContainer, swap: 'innerHTML' });
                    }
                }
            }
        }));
    });
</script>
{% endblock %}

{% block content %}
<div
    x-data="appLayout"
    @refresh-tutor-list.window="refreshTutors()"
    class="relative min-h-screen bg-nord-bg"
>
    <!-- Sidebar -->
    <aside
        class="fixed top-0 left-0 h-full w-72 bg-nord-bg-2 border-r border-nord-border
               flex flex-col z-40
               transform transition-transform duration-300 ease-in-out"
        :class="{ 'translate-x-0': sidebarOpen, '-translate-x-full': !sidebarOpen }"
        x-cloak
    >
        {% include "partials/_app_sidebar.html" %}
    </aside>

    <!-- Mobile Backdrop -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-gray-900/80 z-30 md:hidden" x-cloak></div>

    <!-- Main Content Area -->
    <div
        class="transition-all duration-300 ease-in-out"
        :class="{ 'md:ml-72': sidebarOpen }"
    >
        <!-- Minimalist Control Bar -->
        <header 
            class="fixed top-0 left-0 right-0 h-[65px] z-30 bg-nord-bg/80 backdrop-blur-sm border-b border-nord-border"
        >
            <div class="flex items-center h-full px-4">
                <button 
                    @click="sidebarOpen = true"
                    type="button" 
                    class="cursor-pointer p-2 rounded-md text-gray-400 hover:text-white hover:bg-nord-border"
                    title="Show Sidebar"
                    x-show="!sidebarOpen"
                    x-transition
                >
                    <span class="sr-only">Show sidebar</span>
                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
                </button>
            </div>
        </header>

        <!-- Scrollable Main Content -->
        <main class="focus:outline-none">
            <div class="pt-24 px-8 py-8">
                 {% block app_content %}{% endblock %}
            </div>
        </main>
        
    </div>
</div>
{% endblock %}
