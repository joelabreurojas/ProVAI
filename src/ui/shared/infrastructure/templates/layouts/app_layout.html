{% extends "base.html" %} {% block content %}
<div class="mt-16 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
  <!-- Main Flex Container for Two-Column Layout -->
  <div class="flex flex-col md:flex-row md:space-x-8 lg:space-x-12 py-12">
    <!-- Left Sidebar (Column 1) - The Shared Component -->
    <aside class="w-full md:w-1/3 lg:w-1/4 flex-shrink-0">
      {# The sidebar partial now lives in the shared module #} {% include
      "partials/_app_sidebar.html" %}
    </aside>

    <!-- Right Content Panel (Column 2) - The Content Block -->
    <section class="w-full mt-10 md:mt-0">
      {% block app_content %}{% endblock %}
    </section>
  </div>
</div>
{% endblock %}
