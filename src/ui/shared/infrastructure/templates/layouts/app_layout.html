{% extends "base.html" %}

{% block head_scripts %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('appLayout', () => ({
            // This is the single source of truth for visibility, persisted in Local Storage.
            sidebarOpen: Alpine.$persist(true).as('provai_sidebar_open'),
            
            // State for the sidebar's internal content (search, view switching, etc.)
            searchQuery: '',
            tutors: {{ tutors_json | safe }},
            
            view: Alpine.$persist('{{ 'assistants' if user.role == "teacher" and (tutors | selectattr('teacher_id', 'equalto', user.id) | list | length > 0) else 'tutors' }}').as('provai_sidebar_view'),

            // Computed properties to filter the list for the UI
            get enrolledTutors() {
                if (!this.tutors) return [];
                return this.tutors.filter(t => t.teacher_id !== {{ user.id }});
            },
            get ownedAssistants() {
                if (!this.tutors) return [];
                return this.tutors.filter(t => t.teacher_id === {{ user.id }});
            },
            async refreshTutors() {
                try {
                    const response = await fetch('/actions/tutors-data');
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                }
                    const newTutors = await response.json();
                    this.tutors = newTutors;
                } catch (error) {
                    console.error('Failed to refresh tutor list:', error);

                    const toastContainer = document.getElementById('toast-container');
                    if (toastContainer) {
                        htmx.ajax('GET', '/actions/error-toast', {
                            target: toastContainer,
                            swap: 'innerHTML'
                        });
                    }
                }
            }
        }));
    });
</script>
{% endblock %}

{% block content %}
<div
    x-data="appLayout"
    @refresh-tutor-list.window="refreshTutors()"
    class="relative min-h-screen bg-nord-bg"
>

    <!-- Sidebar -->
    <aside
        class="fixed top-0 left-0 h-full w-72 bg-nord-bg-2 border-r border-nord-border
               flex flex-col z-40
               transform transition-transform duration-300 ease-in-out"
        :class="{ '-translate-x-full': !sidebarOpen }"
        x-cloak
    >
        {% include "partials/_app_sidebar.html" %}
    </aside>

    <!-- Mobile Backdrop -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-gray-900/80 z-30 md:hidden" x-cloak></div>

    <!-- Main Content Area (wrapper for content and floating button) -->
    <div
        class="flex-1 flex flex-col overflow-hidden"
    >

        <!-- Floating "Show" Button -->
        <button 
            @click="sidebarOpen = true"
            x-show="!sidebarOpen"
            x-transition:enter="transition ease-in-out duration-200"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            type="button" 
            class="cursor-pointer fixed top-4 left-4 z-20 p-2 rounded-md text-gray-400 bg-nord-bg-2 shadow-lg hover:text-white hover:bg-nord-border"
            title="Show Sidebar"
        >
            <span class="sr-only">Show sidebar</span>
            <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
        </button>

        <!-- Scrollable Main Content -->
        <main 
            class="flex-1 overflow-hidden transition-all duration-300 ease-in-out"
            :class="sidebarOpen ? 'md:ml-72' : 'md:ml-20'"
        >
            <div
                class="h-full overflow-y-auto overflow-x-hidden py-4 px-4"
            >
                {% block app_content %}{% endblock %}
            </div>
        </main>
    </div>
</div>
{% endblock %}
