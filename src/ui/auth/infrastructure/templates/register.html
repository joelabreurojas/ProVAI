{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen px-4 py-12">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold tracking-tight text-white">
                Create Your Account
            </h2>
            <p class="mt-2 text-sm text-gray-400">
                Already have an account? 
                <a href="/auth/login" class="font-medium text-nord-accent hover:underline">Sign in</a>
            </p>
        </div>

        <!-- This container is the target for HTMX swaps -->
        <div id="register-form-container" class="mt-8">
            {% include "partials/_register_form.html" %} 
        </div>

        <div class="mt-10 text-center">
            <a href="/" class="text-sm text-nord-accent hover:underline">
                ← Back to Welcome Page
            </a>
        </div>
    </div>
</div>
{% endblock %}
