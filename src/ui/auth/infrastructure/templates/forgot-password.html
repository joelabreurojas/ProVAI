{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen px-4 py-12">
    <div class="w-full max-w-md">

        <div class="bg-nord-bg-2 border border-nord-border rounded-xl shadow-lg p-8 text-center">
            
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-nord-accent/10">
                <svg class="h-6 w-6 text-nord-accent" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
                </svg>
            </div>

            <div class="mt-4">
                <h3 class="text-lg font-semibold leading-6 text-white">
                    Automated Reset Coming Soon
                </h3>
                <div class="mt-2 text-sm text-gray-400">
                    <p>
                        Our full password reset system is a top priority and will be available shortly.
                    </p>
                    <p class="mt-4">
                        In the meantime, our support team is here to help you regain access to your account.
                    </p>
                </div>
            </div>

            <div class="mt-6">
                <a href="mailto:{{ support_email }}?subject=Password Reset Request for ProVAI"
                    class="btn btn-primary btn-normal">
                    Contact Support
                </a>
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="/auth/login" class="text-sm text-nord-accent hover:underline">
                ← Back to Login
            </a>
        </div>

    </div>
</div>
{% endblock %}
