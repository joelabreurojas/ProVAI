services:
  api:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./tox.ini:/app/tox.ini
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./databases:/app/databases
    env_file:
      - .env
